    <style>
      :root {
        --bg: #0b0b14;
        --panel: #16162a;
        --panel-2: #1d1d36;
        --edge: #33335a;
        --ink: #e8e8f0;
        --muted: #9aa0b5;
        --accent: #b06cff;
      }
      * { box-sizing: border-box; }
      /* The whole app is ONE fixed screen — never scrolls (you play with voice +
         thumbs, no spare hand to scroll). Lobby + room + game each fill the
         viewport exactly. Landscape-locked (manifest) so this matches desktop. */
      html, body { height: 100%; }
      body { margin: 0; background: var(--bg); color: var(--ink); font-family: system-ui, sans-serif;
        overflow: hidden; overscroll-behavior: none; }
      #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
      #game { line-height: 0; }
      .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center; }

      /* --- Lobby (dark arcane) — fills the viewport, never scrolls -------- */
      #lobby {
        flex: 1; min-height: 0; width: 100%; max-width: 1100px; margin: 0 auto;
        background: radial-gradient(120% 120% at 50% 0%, #15152c 0%, #0b0b14 80%);
        padding: 10px 18px; overflow: hidden;
        display: flex; flex-direction: column; gap: 6px;
      }
      #lobby h1 { margin: 0; font-size: 20px; letter-spacing: 1px; flex: 0 0 auto; }
      #lobby .sub { color: var(--muted); font-size: 12px; margin: 0; flex: 0 0 auto; }
      /* The voice-cast hook is the single most differentiating thing about this
         game, but used to be styled identically to the rest of the muted caption
         line — same weight as the OG share image's own bold treatment of this
         phrase, just inline so it costs zero extra vertical space (no-scroll
         layout budget is tight, see the RWD notes elsewhere in this file). */
      #lobby .sub .voice-hook { color: var(--accent); font-size: 14px; font-weight: 800; }
      #lobby label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; }
      #lobby input[type='text'] {
        width: 100%; background: #0d0d1c; color: var(--ink);
        border: 1px solid var(--edge); border-radius: 8px; padding: 10px 12px; font-size: 15px;
      }
      .class-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 8px 0 4px; }
      .class-card {
        background: var(--panel); border: 2px solid var(--edge); border-radius: 10px;
        padding: 12px 8px; cursor: pointer; text-align: center; transition: all 0.12s;
      }
      .class-card:hover { background: var(--panel-2); }
      .class-card.selected { box-shadow: 0 0 0 1px currentColor, 0 0 18px -4px currentColor; }
      .class-card .glyph { font-size: 26px; line-height: 1; margin-bottom: 6px; }
      .class-card .cname { font-size: 15px; font-weight: 600; }
      .class-card .spells { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.4; }
      .btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0; }
      .btns button {
        flex: 1 1 auto; min-width: 92px; background: var(--panel); color: var(--ink);
        border: 1px solid var(--edge); border-radius: 8px; padding: 10px 12px; font-size: 14px;
        cursor: pointer; font-family: inherit;
      }
      .btns button:hover { background: var(--panel-2); }
      .btns button.primary { background: #2a1f4d; border-color: var(--accent); }
      .btns button:disabled { opacity: 0.4; cursor: not-allowed; }
      .code-banner {
        margin: 8px 0 16px; padding: 16px; text-align: center;
        background: #0d0d1c; border: 1px dashed var(--accent); border-radius: 10px;
      }
      .code-banner .code { font-size: 34px; letter-spacing: 8px; font-weight: 700; color: var(--accent); }
      .members { list-style: none; padding: 0; margin: 0; }
      .members li {
        display: flex; justify-content: space-between; padding: 8px 10px; margin-bottom: 6px;
        background: var(--panel); border: 1px solid var(--edge); border-radius: 8px; font-size: 14px;
      }
      .members .ready { color: #6fe39a; }
      .members .waiting { color: var(--muted); }
      #lobby .error { color: #ff8d8d; font-size: 13px; margin-top: 0; min-height: 0; }
      #lobby .error:empty { display: none; }
      #lobby .hint { color: #ffd24d; font-size: 13px; margin-top: 12px; }

      /* --- Home showcase: a single row of 4 character cards + panel below ---
         Previously a 2x2 grid in the 4 corners with the panel in the middle —
         on a wide screen that left a large, oddly empty center gap once the
         panel's own content (a handful of short lines) didn't need nearly
         that much width. One row keeps all 4 identities visible up front
         (the illustrated portraits are this page's best hook) with the
         selection/skill panel given the full width below instead. */
      .showcase {
        flex: 1; min-height: 0;
        display: flex; flex-direction: column; gap: 12px;
      }
      .char-row { flex: 0 0 auto; display: flex; gap: 10px; justify-content: center; }
      .char-card {
        background: var(--panel); border: 2px solid var(--edge); border-radius: 12px;
        padding: 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 3px; overflow: hidden; transition: all 0.12s;
        text-shadow: 0 1px 3px rgba(0,0,0,0.78);
        flex: 1 1 0; min-width: 0; max-width: 230px; height: 176px;
      }
      /* Compact identity cards: sprite + name + world only. The selected
         character's skills + chant editors render in the center panel. */
      .char-card .skills, .char-card .chant-hint, .char-card .crole { display: none; }
      .char-card:hover { filter: brightness(1.15); } /* world bg is set inline per card */
      .char-card.selected { box-shadow: 0 0 0 1px currentColor, 0 0 20px -4px currentColor; }
      .char-card .cworld { font-size: 11px; color: currentColor; opacity: 0.85; font-style: italic;
        margin-bottom: 4px; letter-spacing: 0.5px; }
      .char-card .crecord { font-size: 10px; color: #ffd24d; opacity: 0.9; }
      /* Home footer: social bar (GitHub / Facebook / Buy Me a Coffee) + disclaimer,
         one compact non-scrolling strip at the bottom. */
      .foot { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 3px; }
      .social { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
      .social a { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 999px;
        background: var(--panel); border: 1px solid var(--edge); color: var(--muted); text-decoration: none;
        font-size: 12px; transition: all 0.12s; }
      .social a:hover { color: var(--ink); border-color: var(--accent); background: var(--panel-2); }
      .social a svg { width: 15px; height: 15px; }
      .social a.coffee:hover { color: #ffd24d; border-color: #ffd24d; }
      .disclaimer { max-width: 860px; margin: 0 auto; font-size: 10px; line-height: 1.35;
        color: #676b80; text-align: center; }
      /* --- Multiplayer room: 4 player seats + self picker ----------------- */
      /* Landscape: seats fill the left, the controls bar sits on the right. */
      .room-body { flex: 1; min-height: 0; display: flex; gap: 12px; }
      .room-grid { flex: 1; min-height: 0; display: grid; gap: 8px;
        grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
      @media (orientation: portrait) {
        .room-body { flex-direction: column; }
        .room-bar { width: 100% !important; flex: 0 0 auto !important; }
      }
      /* justify-content:center — a filled seat's content used to pack to the
         top of the cell, leaving a large dead gap below on any desktop-sized
         grid cell (cells are 1fr 1fr, easily 250px+ tall). Centering plus the
         bigger sprite/text sizes below actually use that space instead. */
      .pslot { border: 2px solid var(--edge); border-radius: 12px; padding: 10px; display: flex;
        flex-direction: column; align-items: center; justify-content: center; gap: 6px; min-height: 0;
        overflow: hidden; text-shadow: 0 1px 3px rgba(0,0,0,0.78); }
      .pslot.self { box-shadow: 0 0 0 1px currentColor, 0 0 18px -6px currentColor; }
      .pslot.empty { color: var(--muted); border-style: dashed; justify-content: center;
        background: rgba(255,255,255,0.02); font-size: 13px; gap: 6px; }
      .pslot .empty-mark { font-size: 30px; opacity: 0.4; }
      .pslot-top { position: absolute; top: 10px; left: 10px; right: 10px;
        display: flex; align-items: center; justify-content: space-between; gap: 6px; }
      .pslot { position: relative; }
      .pslot-name { font-size: 14px; font-weight: 700; color: var(--ink); overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap; }
      .pslot .badge { font-size: 10px; padding: 2px 7px; border-radius: 999px; white-space: nowrap; }
      .pslot .badge.host { background: var(--accent); color: #1a1030; }
      .pslot .badge.ready { background: #2e7d46; color: #d6ffe0; }
      .pslot .badge.wait { background: #33334a; color: #aab; }
      .pslot .sprite-box { width: 108px; height: 108px; overflow: hidden; }
      .pslot .walk-sprite { width: 96px; height: 96px; transform: scale(1.12); transform-origin: top left;
        image-rendering: pixelated; background-repeat: no-repeat; }
      .pslot .cname { font-size: 19px; font-weight: 700; }
      .pslot .crole { font-size: 12px; color: var(--muted); text-align: center; }
      .pslot-skills { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; width: 100%; max-width: 220px; }
      .ps-skill { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; color: var(--ink);
        cursor: help; }
      .room-bar { flex: 0 0 320px; width: 320px; display: flex; flex-direction: column; gap: 6px;
        justify-content: center; }
      .picker { display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 0; }
      .picker-label { color: var(--muted); font-size: 13px; }
      .picker .chip { padding: 6px 13px; border-radius: 999px; border: 1px solid var(--edge);
        background: var(--panel); color: var(--ink); cursor: pointer; font: inherit; font-size: 13px; }
      .picker .chip.on { border-color: var(--cc); box-shadow: 0 0 0 1px var(--cc); color: var(--cc); }
      .picker .chip:hover { background: var(--panel-2); }
      .code-inline { color: var(--accent); letter-spacing: 2px; font-size: 1.1em; }
      .link-btn { background: none; border: none; color: var(--accent); text-decoration: underline;
        cursor: pointer; font: inherit; font-size: inherit; padding: 0; }
      .link-btn:hover { opacity: 0.8; }
      /* The invite link is the single highest-value action in the room view —
         under time pressure a host will default to reading the room code
         aloud unless the link itself visually competes with (or beats) the
         code's own prominence. A small filled pill instead of plain
         underlined text, without needing a whole separate line. */
      .link-btn.promote { background: #2a1f4d; border: 1px solid var(--accent); text-decoration: none;
        border-radius: 999px; padding: 3px 10px; font-weight: 700; }
      .link-btn.promote:hover { background: #35275e; opacity: 1; }
      /* Room chat */
      .chat { max-width: 560px; margin: 0 auto; width: 100%; }
      .chat-log { height: 64px; overflow-y: auto; background: rgba(0,0,0,0.25); border: 1px solid var(--edge);
        border-radius: 10px; padding: 6px 10px; font-size: 12px; text-align: left;
        display: flex; flex-direction: column; gap: 2px; }
      .chat-log:empty::before { content: '房間聊天 · 討論要選哪隻'; color: var(--muted); }
      .chat-line { color: var(--ink); line-height: 1.45; }
      .chat-line b { color: var(--accent); margin-right: 5px; }
      .chat-row { display: flex; gap: 6px; margin-top: 6px; }
      .chat-row input { flex: 1; min-width: 0; background: var(--panel); border: 1px solid var(--edge);
        border-radius: 8px; color: var(--ink); padding: 7px 10px; font: inherit; font-size: 13px; }
      .chat-row button { background: var(--panel-2); border: 1px solid var(--edge); border-radius: 8px;
        color: var(--ink); cursor: pointer; font: inherit; font-size: 13px; padding: 7px 12px;
        display: flex; align-items: center; }
      .chat-row button:hover { background: var(--panel); border-color: var(--accent); }
      #chat-send { background: var(--accent); color: #1a1030; border-color: var(--accent); font-weight: 700; }
      /* Chat drawer toggle — only the mobile-landscape block below displays it;
         desktop keeps the chat inline so this stays hidden there. */
      .chat-toggle { display: none; position: relative; align-items: center; justify-content: center;
        gap: 5px; background: var(--panel); border: 1px solid var(--edge); border-radius: 999px;
        color: var(--ink); font: inherit; font-size: 12px; padding: 4px 12px; cursor: pointer;
        align-self: flex-start; }
      .chat-toggle svg { width: 14px; height: 14px; }
      .chat-toggle .dot { display: none; position: absolute; top: -3px; right: -3px; width: 10px;
        height: 10px; border-radius: 50%; background: #ff5a5a; box-shadow: 0 0 6px #ff5a5a; }
      .chat-toggle.unread .dot { display: block; }
      .char-card .sprite-box { position: relative; width: 112px; height: 112px; overflow: hidden; }
      .char-card .walk-sprite { width: 96px; height: 96px; transform: scale(1.16); transform-origin: top left;
        image-rendering: pixelated; background-repeat: no-repeat; background-position: 0 0; }
      .char-card .fx {
        position: absolute; inset: -18px; border-radius: 50%; pointer-events: none; opacity: 0;
        background: radial-gradient(circle, currentColor 0%, transparent 62%);
      }
      .char-card .fx::after {
        content: ''; position: absolute; inset: 22%; border: 3px solid currentColor; border-radius: 50%; opacity: 0.9;
      }
      .char-card .fx.go { animation: fx-burst 0.7s ease-out; }
      @keyframes fx-burst {
        0% { opacity: 0; transform: scale(0.2); }
        25% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(1.9); }
      }
      .char-card .cname { font-size: 20px; font-weight: 700; margin-top: 0; }
      .char-card .crole { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
      .char-card .chant-hint { font-size: 11px; color: var(--accent); margin: 6px 0 2px; letter-spacing: 0.5px; }
      .char-card .skills { list-style: none; padding: 0; margin: 4px 0 0; width: 100%; }
      .char-card .skill {
        background: #0d0d1c; border: 1px solid var(--edge); border-left: 3px solid currentColor;
        border-radius: 8px; padding: 8px 11px; margin-bottom: 8px; text-align: left; position: relative;
      }
      .char-card .skill .tip {
        display: none; position: absolute; top: -6px; left: 50%; transform: translate(-50%, -100%);
        width: 260px; max-width: 80vw; z-index: 60; text-align: left;
        background: #181830; color: var(--ink); border: 1px solid var(--accent); border-radius: 10px;
        padding: 12px 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      }
      .char-card .skill:hover .tip { display: block; }
      .char-card .skill .tip-name { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
      .char-card .skill .tip-cast { font-size: 12px; color: var(--accent); margin: 4px 0; }
      .char-card .skill .tip-detail { font-size: 13px; color: var(--ink); line-height: 1.6; }
      .char-card .skill .tip-stats { font-size: 12px; color: #8fb7ff; font-family: ui-monospace, monospace; margin-top: 8px; border-top: 1px solid var(--edge); padding-top: 6px; }
      .char-card .skill .chant-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
      .char-card .skill .chant { font-size: 19px; font-weight: 700; letter-spacing: 1px; color: var(--ink); line-height: 1.25; }
      .char-card .skill .edit-chant {
        flex: 0 0 auto; background: transparent; color: var(--muted); border: 1px solid var(--edge);
        border-radius: 6px; padding: 1px 7px; font-size: 11px; cursor: pointer; font-family: inherit;
      }
      .char-card .skill .edit-chant:hover { color: var(--ink); border-color: var(--accent); }
      .char-card .skill .se { font-size: 13px; color: var(--muted); margin-top: 3px; }
      .char-card .skill .ss { font-size: 12px; color: #8fb7ff; font-family: ui-monospace, monospace; margin-top: 4px; }
      /* Top-aligned: on a tall desktop viewport this keeps the leftover empty
         space in one predictable place (below the buttons) instead of split
         above AND below the content — `safe center`'s top-align-on-overflow
         fallback means switching to plain flex-start here never re-introduces
         the short-screen clipping `safe center` was added to prevent (both
         behave identically once content doesn't fit). */
      .center-panel { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: flex-start;
        gap: 8px; min-height: 0; overflow: hidden; }
      /* Selected character's 3 skills + chant editors, shown in the center. */
      /* flex:0 0 auto — keep the skills at their content height; never let the
         flex column shrink this block to nothing on short screens (the bug that
         hid all skills). If the panel overflows, `safe center` clips the optional
         practice at the bottom instead. */
      .center-skills { display: flex; flex-direction: column; gap: 4px; flex: 0 0 auto; }
      .center-skills .cs-head { font-size: 13px; font-weight: 700; text-align: center; letter-spacing: 0.5px; }
      .center-skills .skills { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 5px; }
      .center-skills .skill { background: #0d0d1c; border: 1px solid var(--edge); border-left: 3px solid currentColor;
        border-radius: 8px; padding: 3px 9px; text-align: left; cursor: pointer; }
      .center-skills .skill:hover,
      .center-skills .skill.selected { background: #18142a; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05); }
      .center-skills .chant-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
      .center-skills .chant { font-size: 14px; font-weight: 700; color: var(--ink);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .center-skills .skill-ico { display: inline-flex; width: 18px; height: 18px; flex: 0 0 auto; }
      .center-skills .skill-ico svg { width: 18px; height: 18px; }
      .center-skills .edit-chant { flex: 0 0 auto; background: transparent; color: var(--muted);
        border: 1px solid var(--edge); border-radius: 6px; padding: 1px 7px; font-size: 11px; cursor: pointer; font-family: inherit; }
      .center-skills .edit-chant:hover { color: var(--ink); border-color: var(--accent); }
      .center-skills .skill-detail { background: rgba(13,13,28,0.72); border: 1px solid var(--edge);
        border-left: 3px solid currentColor; border-radius: 8px; padding: 7px 10px; text-align: left; }
      .center-skills .sd-title { font-size: 13px; font-weight: 800; line-height: 1.2; }
      .center-skills .sd-effect { margin-top: 2px; font-size: 12px; color: var(--ink); line-height: 1.35; }
      .center-skills .sd-stats { margin-top: 3px; font-size: 11px; color: #8fb7ff; font-family: ui-monospace, monospace; line-height: 1.35; }
      .center-skills .sd-body { margin-top: 4px; font-size: 12px; color: var(--muted); line-height: 1.45; }
      .center-skills .se { font-size: 11px; color: var(--muted); margin-top: 2px; }
      .center-skills .skill.hit { animation: skill-hit 0.9s ease-out; }
      .name-label { display: block; font-size: 11px; color: var(--muted); margin: 0 0 3px; }
      .name-row { display: flex; gap: 8px; }
      .name-row input { flex: 1 1 auto; }
      .name-row #btn-reroll {
        flex: 0 0 auto; background: var(--panel); color: var(--ink); border: 1px solid var(--edge);
        border-radius: 8px; padding: 0 12px; font-size: 13px; cursor: pointer; font-family: inherit; white-space: nowrap;
      }
      .name-row #btn-reroll:hover { background: var(--panel-2); }
      /* Warm-up practice — a compact trigger + a FLOATING modal (position:fixed,
         so it overlays the viewport and is never clipped by the fixed page). */
      .practice-open { flex: 0 0 auto; background: var(--panel); color: var(--accent);
        border: 1px solid var(--accent); border-radius: 8px; padding: 0 12px; font: inherit;
        font-size: 13px; cursor: pointer; white-space: nowrap; }
      .practice-open:hover { background: var(--panel-2); }

var bubble,anchor;
function addCss(){if(document.getElementById("yz-promo-css"))return;var s=document.createElement("style");s.id="yz-promo-css";s.textContent=CSS;document.head.appendChild(s)}
function inFooter(el){try{return !!(el.closest&&el.closest('footer,nav,[class*="footer"],[id*="footer"]'))}catch(e){return false}}
function findAnchor(){var as=document.querySelectorAll('a[href*="buymeacoffee.com/yazelin"]');if(!as.length)return null;
var vis=[],i,r;for(i=0;i<as.length;i++){r=as[i].getBoundingClientRect();if(r.width||r.height)vis.push(as[i])}
var pool=vis.length?vis:[].slice.call(as);
for(i=0;i<pool.length;i++)if(inFooter(pool[i]))return pool[i];
return pool[pool.length-1]}
function inject(){if(!INJECT||findAnchor()||document.querySelector(".yz-cluster"))return;
var n=document.createElement("nav");n.className="yz-cluster";n.setAttribute("aria-label","作者連結");
n.innerHTML='<a href="'+GH+'" target="_blank" rel="noopener" aria-label="GitHub 原始碼" title="GitHub 原始碼">'+ICONS.gh+'</a>'+

(ADDBLOG?'<a class="yz-blog" href="https://yazelin.github.io/" target="_blank" rel="noopener" aria-label="亞澤的部落格" title="亞澤的部落格">'+ICONS.blog+'</a>':'');
document.body.appendChild(n)}
function blogLinked(){var as=document.querySelectorAll('a[href^="https://yazelin.github.io"]');for(var i=0;i<as.length;i++){try{if(new URL(as[i].href).pathname==="/")return true}catch(e){}}return false}
function addBlog(){if(!ADDBLOG||document.querySelector(".yz-blog")||blogLinked()||!inFooter(anchor))return;
var c=anchor.cloneNode(true);c.classList.remove("yz-hop");c.classList.add("yz-blog");
c.href="https://yazelin.github.io/";c.setAttribute("aria-label","亞澤的部落格");c.setAttribute("title","亞澤的部落格");
if(c.querySelector("svg")){var sv=c.querySelector("svg");sv.outerHTML=ICONS.blog;var extra=c.querySelectorAll("svg");if(extra.length>1)for(var j=1;j<extra.length;j++)extra[j].remove()}else{c.textContent="部落格"}
anchor.parentNode.insertBefore(c,anchor.nextSibling)}
function hop(){anchor.classList.remove("yz-hop");void anchor.offsetWidth;anchor.classList.add("yz-hop")}
var shown=0,MAX_SHOWS=3;
function say(){if(document.hidden)return;var r=anchor.getBoundingClientRect();if(!r.width&&!r.height)return;if(r.bottom<0||r.top>innerHeight)return;shown++;
bubble.textContent=LINES[Math.floor(Math.random()*LINES.length)];
bubble.classList.remove("yz-on","yz-above","yz-below");
bubble.style.left="0px";bubble.style.top="0px";
var bw=bubble.offsetWidth,bh=bubble.offsetHeight,cx=r.left+r.width/2;
var left=Math.max(8,Math.min(cx-bw/2,innerWidth-bw-8));
var above=r.top-bh-12>=8;
bubble.style.left=left+"px";
bubble.style.top=(above?r.top-bh-12:r.bottom+12)+"px";
bubble.classList.add(above?"yz-above":"yz-below");
bubble.style.setProperty("--yz-tail",Math.max(12,Math.min(cx-left,bw-12))+"px");
hop();
requestAnimationFrame(function(){bubble.classList.add("yz-on")});
setTimeout(function(){bubble.classList.remove("yz-on")},4200)}
function start(){addCss();inject();anchor=findAnchor();if(!anchor)return false;
try{if(getComputedStyle(anchor).display==="inline")anchor.style.display="inline-block"}catch(e){}
anchor.classList.add("yz-idle");
anchor.addEventListener("animationend",function(e){if(e.animationName==="yzHop")anchor.classList.remove("yz-hop")});
try{addBlog()}catch(e){}
bubble=document.createElement("div");bubble.className="yz-bubble";bubble.setAttribute("aria-hidden","true");document.body.appendChild(bubble);
window.__yzPromo=say;
(function loop(first){if(shown>=MAX_SHOWS)return;setTimeout(function(){say();loop(false)},first?18e3+Math.random()*12e3:9e4+Math.random()*9e4)})(true);
return true}
function boot(){var tries=0;(function t(){if(start())return;if(++tries<20)setTimeout(t,1500)})()}
if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot);else boot();
})();
