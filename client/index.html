<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>真。AI。咏唱魔法</title>
    <style>
      body { margin: 0; background: #0b0b14; color: #e8e8f0; font-family: system-ui, sans-serif; }
      #app { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 8px; }
      #game { line-height: 0; }
      .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center; }
      #class-picker { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
      #class-picker button {
        background: #16162a; border: 1px solid #444; border-radius: 8px;
        padding: 8px 16px; font-size: 15px; cursor: pointer; font-family: inherit;
      }
      #class-picker button:hover { background: #20203a; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="row">
        <strong>真。AI。咏唱魔法</strong>
        <label>詠唱模式:
          <select id="mode">
            <option value="mueisho">無詠唱(直接喊法術名)</option>
            <option value="eisho">詠唱(先念呪文)</option>
          </select>
        </label>
        <span id="mic-status">麥克風:未啟動</span>
      </div>
      <div id="class-picker" class="row"></div>
      <div id="hud" class="row"></div>
      <div id="game"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
