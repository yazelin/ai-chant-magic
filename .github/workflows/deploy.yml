name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # run the pure-logic suites (shared sim + server); client has its own unit tests too
      - run: npm run test
      - run: npm run test:client
      # build only the client workspace for Pages; output is client/dist
      # VITE_SERVER_URL bakes the live Render ws server in as the default;
      # players can still override per-session with ?server=wss://...
      # VITE_LEADERBOARD_URL bakes in the 週挑戰 leaderboard Worker (see
      # cloudflare/leaderboard/) — a separate, independently-deployed backend.
      # VITE_VOICE_PROXY_URL bakes in the Groq voice-recognition fallback
      # Worker (see cloudflare/voice-proxy/) — used only when a browser's own
      # Web Speech API is unsupported or non-functional.
      - run: npm run build:client
        env:
          VITE_SERVER_URL: wss://ai-chant-magic-server.onrender.com
          VITE_LEADERBOARD_URL: https://ai-chant-magic-leaderboard.yazelinj303.workers.dev
          VITE_VOICE_PROXY_URL: https://ai-chant-magic-voice-proxy.yazelinj303.workers.dev
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
